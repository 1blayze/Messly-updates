services:
  - type: web
    name: messly-gateway
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev
    startCommand: npm run start:gateway
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://messly.site,https://www.messly.site
      - key: CORS_ALLOWED_ORIGINS
        value: https://messly.site,https://www.messly.site
      - key: ALLOW_ELECTRON_ORIGIN
        value: "true"
      - key: MESSLY_CDN_URL
        value: https://cdn.messly.site
      - key: MESSLY_GATEWAY_SHARD_COUNT
        value: "1"
      - key: MESSLY_REDIS_URL
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_FORCE_PATH_STYLE
        value: "true"
