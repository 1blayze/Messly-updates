    <style>
      :root {
        color-scheme: dark;
        --messly-loader-bg: #111314;
        --messly-loader-muted: #9ca3af;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--messly-loader-bg);
      }

      body {
        overflow: hidden;
      }

      #messly-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        background: var(--messly-loader-bg);
        will-change: opacity, transform;
      }

      .messly-loading-inner {
        width: min(88vw, 320px);
        text-align: center;
      }

      .messly-loading-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 82px;
        height: 82px;
        user-select: none;
        -webkit-user-drag: none;
        transform-origin: 50% 50%;
        animation: messlyLogoBreath 3s ease-in-out infinite;
      }

      .messly-loading-logo svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .messly-loading-text {
        margin-top: 22px;
        text-align: center;
        animation: none;
        transition: none;
        transform: none;
      }

      .messly-loading-title {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1.6px;
        color: #e5e7eb;
        text-transform: uppercase;
        animation: none;
        transition: none;
        transform: none;
      }

      .messly-loading-subtitle {
        margin-top: 8px;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: #9ca3af;
        animation: none;
        transition: none;
        transform: none;
      }

      @keyframes messlyLogoBreath {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
        100% {
          transform: scale(1);
        }
      }

      #root {
        min-height: 100vh;
        background: var(--messly-loader-bg);
      }
    </style>
    <title>Messly</title>
  </head>
